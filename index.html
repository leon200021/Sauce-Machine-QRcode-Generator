<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醬料機 QR 指令產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #2a1a10 0%, #111827 100%);
            color: #f3f4f6;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #qrcode img {
            margin: 0 auto;
            border: 16px solid white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .gold-glow {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }
        
        input:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4">
    <div class="max-w-xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex p-4 bg-amber-500 text-gray-900 rounded-3xl shadow-2xl mb-4 gold-glow">
                <i data-lucide="droplets" class="w-10 h-10"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2 italic">Sauce Machine Pro</h1>
            <p class="text-amber-500/60 text-sm font-medium tracking-widest uppercase">QR Command Generator (Q1 v1.0)</p>
        </div>

        <!-- Mode Switcher -->
        <div class="flex gap-2 mb-6 p-1 bg-white/5 rounded-2xl border border-white/10">
            <button onclick="setMode('WEIGHT')" id="mode-WEIGHT" class="flex-1 py-3 rounded-xl font-bold transition-all bg-amber-500 text-gray-900">
                WEIGHT (出料)
            </button>
            <button onclick="setMode('INGREDIENTS')" id="mode-INGREDIENTS" class="flex-1 py-3 rounded-xl font-bold transition-all text-white/40 hover:text-white">
                IDENTITY (換料/ID)
            </button>
        </div>

        <!-- Controls -->
        <div class="glass-card rounded-[2.5rem] p-8 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- DST ID -->
                <div>
                    <label class="block text-xs font-bold text-amber-500 tracking-widest uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="cpu" class="w-4 h-4"></i>
                        目標 ID (DST)
                    </label>
                    <div class="flex items-center gap-4">
                        <input type="text" id="dstId" value="01" maxlength="2" 
                               class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl focus:border-blue-500 outline-none text-2xl font-bold mono text-center"
                               oninput="this.value = this.value.toUpperCase().replace(/[^0-9A-F]/g, ''); updateAll();">
                    </div>
                    <p class="text-[10px] text-white/30 mt-2">註: 切換身分建議設為 00 (廣播)</p>
                </div>

                <!-- Weight Amount / Ingredient Name -->
                <div>
                    <label id="dataLabel" class="block text-xs font-bold text-amber-500 tracking-widest uppercase mb-3 flex items-center gap-2">
                        <i data-lucide="scale" class="w-4 h-4"></i>
                        出料重量 (g)
                    </label>
                    <div class="relative">
                        <input type="text" id="dataVal" value="25.0"
                               class="w-full pl-6 pr-14 py-4 bg-white/5 border border-white/10 rounded-2xl focus:border-blue-500 outline-none text-2xl font-bold mono"
                               oninput="updateAll()">
                        <span id="unitLabel" class="absolute right-6 top-1/2 -translate-y-1/2 text-white/30 font-bold">g</span>
                    </div>
                </div>
            </div>

            <!-- Protocol Preview -->
            <div class="mt-10 bg-black/40 rounded-3xl p-6 border border-white/5 relative group">
                <p class="text-[10px] text-white/40 font-bold uppercase tracking-widest mb-3">Protocol String</p>
                <div id="rawString" class="text-blue-400 font-bold mono break-all text-lg mb-2"></div>
                <div class="flex items-center gap-2 text-xs text-white/40 font-medium">
                    <span class="px-2 py-0.5 bg-white/5 rounded border border-white/10">CRC: <span id="crcVal" class="text-green-400">--</span></span>
                    <span class="px-2 py-0.5 bg-white/5 rounded border border-white/10">CMD: WEIGHT</span>
                </div>
                <button onclick="copyToClipboard()" class="absolute top-6 right-6 p-3 bg-white/5 text-white/40 rounded-xl hover:text-white hover:bg-white/10 transition-all">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- QR Display -->
        <div id="resultArea" class="glass-card rounded-[2.5rem] p-10 text-center animate-in zoom-in duration-500">
            <div id="qrcode" class="flex justify-center mb-8"></div>
            
            <div class="flex gap-4">
                <button onclick="downloadQR()" class="flex-1 flex items-center justify-center gap-3 py-4 px-6 bg-white/10 hover:bg-white/20 text-white rounded-2xl font-bold transition-all active:scale-95">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    Save Image
                </button>
                <button onclick="updateAll()" class="w-16 flex items-center justify-center bg-amber-500 text-gray-900 rounded-2xl font-bold hover:bg-amber-400 transition-all active:rotate-180 duration-500">
                    <i data-lucide="refresh-cw" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-4 rounded-3xl text-sm font-bold shadow-2xl z-50 hidden animate-in slide-in-from-bottom-5"></div>

    <script>
        let qrcode = null;
        let currentMode = 'WEIGHT';

        window.onload = () => {
            lucide.createIcons();
            updateAll();
        };

        function setMode(mode) {
            currentMode = mode;
            
            // UI Toggle
            const btnWeight = document.getElementById('mode-WEIGHT');
            const btnIng = document.getElementById('mode-INGREDIENTS');
            const dataLabel = document.getElementById('dataLabel');
            const unitLabel = document.getElementById('unitLabel');
            const dstId = document.getElementById('dstId');

            if (mode === 'WEIGHT') {
                btnWeight.className = "flex-1 py-3 rounded-xl font-bold transition-all bg-amber-500 text-gray-900";
                btnIng.className = "flex-1 py-3 rounded-xl font-bold transition-all text-white/40 hover:text-white";
                dataLabel.innerHTML = '<i data-lucide="scale" class="w-4 h-4"></i> 出料重量 (g)';
                unitLabel.innerText = 'g';
                document.getElementById('dataVal').type = 'number';
                document.getElementById('dataVal').value = "25.0";
            } else {
                btnIng.className = "flex-1 py-3 rounded-xl font-bold transition-all bg-amber-500 text-gray-900";
                btnWeight.className = "flex-1 py-3 rounded-xl font-bold transition-all text-white/40 hover:text-white";
                dataLabel.innerHTML = '<i data-lucide="package" class="w-4 h-4"></i> 換料名稱 / ID';
                unitLabel.innerText = 'ID';
                document.getElementById('dataVal').type = 'text';
                document.getElementById('dataVal').value = "01";
                dstId.value = "00"; // 切換身分建議廣播
            }
            
            lucide.createIcons();
            updateAll();
        }

        function calculateCRC(input) {
            let sum = 0;
            for (let i = 0; i < input.length; i++) {
                sum += input.charCodeAt(i);
            }
            let crc = sum & 0xFF;
            return crc.toString(16).toUpperCase().padStart(2, '0');
        }

        function updateAll() {
            const dst = document.getElementById('dstId').value.padStart(2, '0') || '01';
            let dataRaw = document.getElementById('dataVal').value;
            let dataStr = dataRaw;

            if (currentMode === 'WEIGHT') {
                const weight = parseFloat(dataRaw) || 0;
                // 格式化：若為整數則不留小數點，否則留一位
                dataStr = weight % 1 === 0 ? weight : weight.toFixed(1).replace(/\.0$/, '');
            }

            const preString = `Q1|${dst}|${currentMode}|${dataStr}`;
            const crc = calculateCRC(preString);
            const finalString = `${preString}|${crc}`;

            document.getElementById('rawString').innerText = finalString;
            document.getElementById('crcVal').innerText = crc;

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";
            qrcode = new QRCode(qrContainer, {
                text: finalString,
                width: 280,
                height: 280,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function copyToClipboard() {
            const text = document.getElementById('rawString').innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast("Command Copied to Clipboard!");
            });
        }

        function downloadQR() {
            const img = document.querySelector('#qrcode img');
            if (img) {
                const link = document.createElement('a');
                link.download = `SAUCE_${document.getElementById('weightVal').value}g_DST${document.getElementById('dstId').value}.png`;
                link.href = img.src;
                link.click();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('animate-out', 'fade-out', 'slide-out-to-bottom-5');
                setTimeout(() => {
                    toast.classList.add('hidden');
                    toast.classList.remove('animate-out', 'fade-out', 'slide-out-to-bottom-5');
                }, 500);
            }, 2500);
        }
    </script>
</body>
</html>
